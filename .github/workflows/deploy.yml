name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: orison-worker
        run: npm install

      - name: Deploy with Wrangler
        working-directory: orison-worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  smoke-test:
    runs-on: ubuntu-latest
    name: Smoke Test
    needs: deploy

    steps:
      - name: Check live pages (JA + EN)
        run: |
          FAILED=0

          check() {
            URL="$1"; LANG="$2"; MARKER="$3"; PAGE="$4"
            HTTP=$(curl -s -H "Accept-Language: $LANG" -o /tmp/smoke_body -w '%{http_code}' "$URL")
            if [ "$HTTP" != "200" ]; then
              echo "FAIL [$PAGE $LANG] HTTP $HTTP (expected 200)"
              FAILED=1
              return
            fi
            if ! grep -qF "$MARKER" /tmp/smoke_body; then
              echo "FAIL [$PAGE $LANG] marker not found: $MARKER"
              FAILED=1
              return
            fi
            echo "OK   [$PAGE $LANG]"
          }

          sleep 15

          # マーカーは各ページの生成HTML（src/i18n.js の DICT）と同期していること。
          # T('key', lang) の値（ja側・en側）を変更したら、対応するマーカーもここで更新する。
          # Accept-Language ヘッダで明示的に言語を指定する（未指定だと getLang() は en を返すため、
          # 指定なしでは常にENページが返り、JAマーカーのcheckが全滅する＝今回の不具合の原因）。
          # 「|」は ASCII パイプ (U+007C)。全角パイプ・縦線と取り違えないこと。
          check 'https://brake.run/'           ja 'とどく時間を、えらべる'                '/'
          check 'https://brake.run/'           en 'Choose when it arrives'               '/'
          check 'https://brake.run/time-lock'  ja 'Rivest-Shamir-Wagner方式の逐次2乗計算' '/time-lock'
          check 'https://brake.run/time-lock'  en 'What is Time-Lock Cryptography?'       '/time-lock'
          check 'https://brake.run/philosophy' ja 'なぜ、待たせるのか'                    '/philosophy'
          check 'https://brake.run/philosophy' en 'Why make people wait?'                 '/philosophy'
          check 'https://brake.run/terms'      ja '利用規約 | Brake.'                     '/terms'
          check 'https://brake.run/terms'      en 'Terms of Service | Brake.'             '/terms'
          check 'https://brake.run/privacy'    ja 'プライバシーポリシー | Brake.'          '/privacy'
          check 'https://brake.run/privacy'    en 'Privacy Policy | Brake.'               '/privacy'

          [ "$FAILED" -eq 0 ] || exit 1
