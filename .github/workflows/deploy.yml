name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: orison-worker
        run: npm install

      - name: Deploy with Wrangler
        working-directory: orison-worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  smoke-test:
    runs-on: ubuntu-latest
    name: Smoke Test
    needs: deploy

    steps:
      - name: Check live pages
        run: |
          FAILED=0

          check() {
            URL="$1"; MARKER="$2"; PAGE="$3"
            HTTP=$(curl -s -o /tmp/smoke_body -w '%{http_code}' "$URL")
            if [ "$HTTP" != "200" ]; then
              echo "FAIL [$PAGE] HTTP $HTTP (expected 200)"
              FAILED=1
              return
            fi
            if ! grep -qF "$MARKER" /tmp/smoke_body; then
              echo "FAIL [$PAGE] marker not found: $MARKER"
              FAILED=1
              return
            fi
            echo "OK   [$PAGE]"
          }

          sleep 15

          # マーカーは各ページの生成HTMLと同期していること。
          # src/index.js の title/meta/JSON-LD を変更したら、対応するマーカーもここで更新する。
          # 「|」は ASCII パイプ (U+007C)。全角パイプ・縦線と取り違えないこと。
          check 'https://brake.run/'           'タイムロック暗号化サービス'            '/'
          check 'https://brake.run/time-lock'  'Rivest-Shamir-Wagner方式の逐次2乗計算' '/time-lock'
          check 'https://brake.run/philosophy' 'なぜ、待たせるのか'                    '/philosophy'
          check 'https://brake.run/terms'      '利用規約 | Brake.'                     '/terms'
          check 'https://brake.run/privacy'    'プライバシーポリシー | Brake.'          '/privacy'

          [ "$FAILED" -eq 0 ] || exit 1
