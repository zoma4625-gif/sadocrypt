name: Synthetic Monitor

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 09:00 JST
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run encrypt→decrypt round-trip
        run: node orison-worker/scripts/synthetic-monitor.mjs https://brake.run
